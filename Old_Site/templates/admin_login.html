<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProjectAthlete</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="admin-login-header">
        <div class="theme-selector">
            <button class="theme-button" id="themeButton" aria-label="Select theme">
                <span>🎨</span>
                <span id="themeButtonText">Theme</span>
            </button>
            <div class="theme-menu" id="themeMenu">
                <button class="theme-option" data-theme="gold">
                    <span class="theme-option-icon gold"></span>
                    <span>Gold</span>
                </button>
                <button class="theme-option active" data-theme="light">
                    <span class="theme-option-icon light"></span>
                    <span>Light</span>
                </button>
                <button class="theme-option" data-theme="dark">
                    <span class="theme-option-icon dark"></span>
                    <span>Dark</span>
                </button>
                <button class="theme-option" data-theme="blue">
                    <span class="theme-option-icon blue"></span>
                    <span>Blue</span>
                </button>
                <button class="theme-option" data-theme="pink">
                    <span class="theme-option-icon pink"></span>
                    <span>Pink</span>
                </button>
            </div>
        </div>
    </header>
    <div class="login-container">
        <h1 class="login-title">Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            <div style="text-align: center; margin-top: 16px;">
                <a href="/signup" style="color: var(--text-secondary); text-decoration: none;">Don't have an account? Sign Up</a>
            </div>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin_login.js') }}"></script>
</body>
</html>
