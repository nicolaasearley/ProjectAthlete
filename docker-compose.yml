services:
  postgres:
    image: postgres:15-alpine
    container_name: project-athlete-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fitness_earley}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/backups:/backups
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - project-athlete-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: project-athlete-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - project-athlete-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: project-athlete-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fitness_earley}?schema=public
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      
      # Application
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3000}
      API_HOST: ${API_HOST:-0.0.0.0}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      
      # Storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOADS_DIR: ${UPLOADS_DIR:-/data/uploads}
      MEDIA_PUBLIC_URL: ${MEDIA_PUBLIC_URL:-/media}
      
      # SMTP (Optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@fitnessearley.com}
    volumes:
      - uploads_data:/data/uploads
      - ./logs:/app/logs
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - project-athlete-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: project-athlete-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Database (if worker needs DB access)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fitness_earley}?schema=public
      
      # Application
      NODE_ENV: ${NODE_ENV:-production}
      
      # Storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOADS_DIR: ${UPLOADS_DIR:-/data/uploads}
    volumes:
      - uploads_data:/data/uploads
    networks:
      - project-athlete-network
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node dist/index.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: ${API_URL:-http://localhost:${API_PORT:-3000}}
    container_name: project-athlete-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      API_URL: http://backend:3000
      API_HOST: ${API_HOST:-0.0.0.0}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - project-athlete-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  project-athlete-network:
    driver: bridge


